<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huỳnh Tiến Dũng | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <h1 class="loader-title">Huỳnh Tiến Dũng</h1>
        <div class="loader-bar"></div>
        
        <button id="enter-btn" onclick="startPortfolio()" style="display: none; margin-top: 25px; padding: 12px 28px; background: transparent; border: 1px solid #fff; color: #fff; cursor: pointer; font-family: 'Inter', sans-serif; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; transition: all 0.3s ease; backdrop-filter: blur(5px);">
            Khám phá ngay
        </button>
    </div>

    <canvas id="particle-canvas"></canvas>

    <video autoplay loop muted playsinline class="video-background">
        <source src="background.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div id="youtube-player"></div>

    <button class="music-control" id="musicBtn" onclick="toggleMusic()">
        <i class="fas fa-music" id="musicIcon"></i>
        <span id="musicText">Bật Nhạc</span>
    </button>

    <div class="container animate-fade-in">
        <div class="avatar-wrapper">
            <img src="avatar.png" alt="Huỳnh Tiến Dũng" class="avatar">
        </div>
        
        <h1 class="profile-name">Huỳnh Tiến Dũng</h1>
        <p class="profile-bio">một người yêu thích khoa học, động vật và âm nhạc.</p>

        <div class="links-container">
            
            <div class="link-item discord-item" onclick="copyDiscordName('t.dxng')">
                <i class="fa-brands fa-discord"></i>
                <div class="link-text">
                    <span>Discord:</span>
                    <strong id="t.dxng">t.dxng</strong> 
                </div>
                <span class="tooltip" id="discordTooltip">Click để copy</span>
            </div>

            <a href="https://www.facebook.com/tdxngggg" target="_blank" class="link-item">
                <i class="fa-brands fa-facebook-f"></i> <span>Facebook</span>
            </a>

            <a href="https://www.instagram.com/t.dxng/" target="_blank" class="link-item">
                <i class="fa-brands fa-instagram text-icon"></i> <span>Instagram</span>
            </a>

        </div>

        <div class="visitor-counter" style="text-align: center; margin-top: 25px; font-size: 0.85rem; opacity: 0.5; font-family: 'Inter', sans-serif; letter-spacing: 1px;">
            <i class="fas fa-eye" style="margin-right: 5px;"></i> Lượt ghé thăm: <span id="count" style="font-weight: 600;">...</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="script.js"></script>
</body>
</html>
